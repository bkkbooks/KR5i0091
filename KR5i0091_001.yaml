front:
  text: 太上玄門功課經重刋道藏輯要太上玄門早壇功課經太上玄門功課經序竊以金書玉笈為入道之門墻諷經誦呪乃修仙之徑路得入道之門可以復元始之性得修仙之路得以曉自然之心是故道者住叢林焚香火三千日裏勤功十二時中無怠朝夕朝禮聖容當輪自己之誠殷勤祝釐國祚必獲升仙之慶且夫功課者何為者也功課者課功也課自己之功者修自身之道也修自身之道者賴先聖之典也誦上聖之金書玉誥明自己之本性真心非科教不能弘揚大道非課誦無以保養元和經之為經是前聖之心宗呪之為呪乃古仙之妙法誦之誠者則經明行之篤者則法驗經明則道契於內法驗則術彰於外經明法驗而兩全內功外行而俱有此是住叢林者之規範升仙者之梯蹬非叢林無以陶鎔大衆之德性非梯蹬何以希求出世之真仙若肯誠心修道二六時中刻刻提撕時時檢點在世端能出世居塵自可離塵迥出是非之門直達無為之路逍遙宇宙出入虛無自由自在無滅無生方寸不立一塵妙用直超三際若此者了自心一念之誠出世上三途之苦履長生之道路脫苦海之迷津既無前愆之可懺亦無後過之可悔無前愆之可懺者心正也無後過之可悔者意誠也心正則無惡業意誠那有災殃無惡業則立到天堂無災殃則出離地獄功高宇宙德契虛皇禳災而災消祈福而福至無求而不應有感必皆通課誦諸品仙經及羣真寶號故淨心淨口淨身而有呪安天安地安神而有章皆有次序更無躐等雖是隨堂之功課實為祝國祚之大猷朝夕誦念書夜忘疲直候三千功滿八百行圓方是出家之上事丈夫之道德也蠟燭澗中觀鳩衆梓行施布四方使天下之道衆遵法依科教信受奉行是為序凡誦經者切須齋戒嚴整衣冠誠心定氣叩齒演音然後朗誦愼勿輕慢交談接語務在端肅念念無違隨願禱祝自然感應先念步虛後諷經呪太上早壇功課經大衆登壇分班序立主經念琳琅振響十方肅淸河海靜默山嶽吞煙萬靈振伏招集羣仙天無氛穢地無妖塵冥慧洞淸大量玄玄也舉大羅三寶天尊靈音到處滅罪消愆寶號宣時扶危救難將當有開壇演教之偈仰勞道衆隨聲應和
