body:
  text: 上壇齊舉步虛聲祝國迎祥竭寸誠當日陳情金闕內今朝香靄玉爐焚皇圖鞏固山河壯帝道遐昌日月明萬民瞻仰堯舜日歲稔豐登樂太平常淸常淨天尊主經念真心淸淨道為宗譬彼中天寶月同淨掃迷雲無點翳一輪光滿太虛空上藥身中神氣精人人具足匪虧盈能知混合回風道金鼎黃芽日日生道場衆等人各恭敬恭對帝前諷經如法主經念寶經未開先念淨心口神咒衆當持誦淨心神咒太上台星應變無停驅邪縛魅保命護身智慧明淨心神安寧三魂永久魄無喪傾急急如律令淨口神咒丹朱口神吐穢除氛舌神正倫通命養神羅千齒神卻邪衛真喉神虎賁氣神引津心神丹元令我通真思神鍊液道氣長存急急如律令淨身神咒靈寶天尊安慰身形弟子魂魄五臟玄冥靑龍白虎隊仗紛紜朱雀玄武侍衛身形急急如律令安土地神咒元始安鎮普告萬靈嶽瀆真官土地祗靈左社右稷不得妄驚回向正道內外澄淸各安方位備守家庭太上有命搜捕邪精護法神王保衛誦經皈依大道元亨利貞急急如律令淨天地解穢咒天地自然穢氣分散洞中玄虛晃朗太元八方威神使我自然靈寶符命普告九天乾羅答那洞罡太玄斬妖縛邪度人萬千中山神咒元始玉文吾誦一遍卻病延年按行五嶽八海知聞魔王束首侍衛我軒凶穢消散道氣常存急急如律令祝香咒道由心學心假香傳香爇玉爐心存帝前真靈下盼仙斾臨軒令臣關告徑達九天金光神咒天地玄宗萬氣本根廣修萬劫證吾神通三界內外惟道獨尊體有金光覆映吾身視之不見聽之不聞包羅天地養育羣生受持萬遍身有光明三界侍衛五帝司迎萬神朝禮役使雷霆鬼妖喪膽精怪亡形內有霹𩆝雷神隱名洞慧交徹五氣騰騰金光速現覆護真人急急如律令開經玄藴咒雲篆太虛浩劫之初乍遐乍邇或沈或浮五方徘徊一丈之餘天真皇人按筆乃書以演洞章次書靈符元始下降真文誕敷昭昭其有冥冥其無沈痾能自全塵勞溺可扶幽冥將有賴由是升仙都太上老君説常淸靜經老君曰大道無形生育天地大道無情運行日月大道無名長養萬物吾不知其名強名曰道夫道者有淸有濁有動有靜天淸地濁天動地靜男淸女濁男動女靜降本流末而生萬物淸者濁之源動者靜之基人能常淸靜天地悉皆歸夫人神好淸而心擾之人心好靜而欲牽之常能遣其欲而心自靜澄其心而神自淸自然六欲不生三毒消滅所以不能者為心未澄欲未遣也能遣之者內觀其心心無其心外觀其形形無其形遠觀其物物無其物三者既悟唯見於空觀空亦空空無所空所空既無無無亦無無無既無湛然常寂寂無所寂欲豈能生欲既不生即是真靜真常應物真常得性常應常靜常淸靜矣如此淸靜漸入真道既入真道名為得道雖名得道實無所得為化衆生名為得道能悟之者可傳聖道老君曰上士無爭下士好爭上德不德下德執德執著之者不名道德衆生所以不得真道者為有妄心既有妄心即驚其神既驚其神即著萬物既著萬物即生貪求既生貪求即是煩惱煩惱妄想憂苦身心便遭濁辱流浪生死常沈苦海永失真道真常之道悟者自得得悟道者常淸靜矣仙人葛公曰吾得真道曾誦此經萬遍此經是天人所習不傳下士吾昔授之於東華帝君東華帝君授之於金闕帝君金闕帝君授之於西王母西王母皆口口相傳不記文字吾今於世書而録之上士悟之升為天官中士修之南宮列仙下士得之在世長年遊行三界升入金門左玄真人曰學道之士持誦此經者即得十天善神擁護其身然後玉符保神金液鍊形形神俱妙與道合真正一真人曰人家有此經悟解之者災障不干衆聖護門神升上界朝拜高真功滿德就感帝君持誦不退身騰紫雲太上老君説常淸靜經太上洞玄靈寶升玄消災護命妙經稽首歸依衆妙道至心恭敬二玄真今運一心心所議粗識此經經所因空色色空無有性有無無有色空均慧風出自天尊力掃除心界不遺塵唯願神光常擁護證明今日守心人今日守心何所證不失凡身得道身爾時元始天尊在七寶林中五明宮內與無極聖衆俱放無極光明照無極世界觀無極衆生受無極苦惱宛轉世間輪回生死漂浪愛河流吹欲海沈滯聲色迷惑有無無空有空無色有色無無有無有有無有終始暗昧不能自門畢竟迷惑天尊告曰汝等衆生從不有中有不無中無不色中色不空中空非有為有非無為無非色為色非空為空空即是空空無定空色即是色色無定色即色是空即空是色若能知空不空知色不色名為照了始達妙音識無空法洞觀無礙入衆妙門自然解悟離諸疑網不著空見淸淨六根斷諸邪障我即為汝説是妙經名為護命濟度衆生傳教世間流通讀誦即有飛天神王破邪金剛護法靈童救苦真人金精猛獸各百億萬衆俱侍衛是經隨所擁護捍厄扶衰度一切衆生離諸染著爾時天尊即説偈曰視不見我聽不得聞離種種邊名為妙道太上洞玄靈寶升玄消災護命妙經太上靈寶天尊説禳災度厄真經爾時天尊在禪黎國土與大道真仙萬萬大千人諸天尊及諸天龍鬼神盡來集會受吾約束世間若有善男子善女人或有年災月厄遊城赤鼠之厄天羅地網之厄命窮算盡之厄疾病纒綿之厄落水波濤之厄虎狼蚖蛇之厄水火盜賊刀兵生産之厄山林樹木社稷之厄土石橋梁之厄毒藥咒詛之厄惟願今對玉皇天尊大道真聖懺悔解禳度脫身中災厄一一解散勿為留難敕諸天神王並降聖力道力承斯經力恩力衛護弟子受持念誦此經已後解禳陽九百六之災三衰八難九橫五苦之厄如求如願所履平安出入行藏所求利益所願遂心於是衆等聞説此經皆大歡喜信受奉行太上靈寶天尊説禳災度厄真經無上玉皇心印妙經上藥三品神與氣精恍恍惚惚杳杳冥冥存無守有頃刻而成回風混合百日功靈默朝上帝一紀飛升知者易悟昧者難行履踐天光呼吸育淸出玄入牝若亡若存綿綿不絶固蒂深根人各有精精合其神神合其氣氣合體真不得其真皆是強名神能入石神能飛形入水不溺入火不焚神依形生精依氣盈不凋不殘松柏靑靑三品一理妙不可聽其聚則有其散則零七竅相通竅竅光明聖日聖月照耀金庭一得永得自然身輕太和充溢骨散寒瓊得丹則靈不得則傾丹在身中非白非靑誦持萬遍妙理自明無上玉皇心印妙經玉淸誥志心皈命禮三界之上梵氣彌羅上極無上天中之天鬱羅蕭臺玉山上京渺渺金闕森羅淨泓玄元一氣混沌之先寶珠之中玄之又玄開明三景化生諸天億萬天真無鞅數衆旋斗厯箕回度五常巍巍大範萬道之宗大羅玉淸虛無自然至真妙道元始天尊上淸誥志心皈命禮居上淸境號靈寶君祖劫化生九萬九千餘梵氣赤書煥發六百六十八真文因混沌赤文而開九霄紀元洞玉厯而分五劫天經地緯巍乎造化之宗樞陰機陽卓爾雷霆之祖大悲大願大聖大慈玉宸道君靈寶天尊泰淸誥志心皈命禮隨方設教厯劫度人為皇者師帝者師王者師假名易號立天之道地之道人之道隱聖顯凡總千二百之官君包萬億重之梵氣化行今古著道德凡五千言主握陰陽命雷霆用九五數大悲大願大聖大慈太上老君道德天尊彌羅誥志心皈命禮太上彌羅無上天妙有玄真境渺渺紫金闕太微玉淸宮無極無上聖廓落發光明寂寂浩無宗玄範總十方湛寂真常道恢漠大神通玉皇大天尊玄穹高上帝天皇誥志心皈命禮紫微宸極勾陳天宫九光寶苑之中五氣玄都之上體元皇而佐司玄化總兩極而共理三才主持兵革之權衡廣推大德統御星辰之躔次毋失常經上象巍峩真元恢漠大悲大願大聖大慈勾陳上宫天皇大帝星主誥志心皈命禮大羅天闕紫微星宫尊居北極之高位正中天之上佛號金輪熾盛道稱玉斗玄尊璇璣玉衡齊七政總天經地緯日月星宿約四時行黃道紫垣萬象宗師諸天統御大悲大願大聖大慈萬星教主無極元皇中天紫微北極大帝后土誥志心皈命禮九華玉闕七寶皇房承天稟命之期主陰執陽之柄道推尊而含弘光大德敷蓄於柔順利貞效法昊天根本育坤元之美流形品物生成施母道之仁嶽瀆是依山川咸仗大悲大願大聖大慈承天效法后土皇地祗神霄誥志心皈命禮高上神霄府凝神煥照宫會元始祖氣以分真應妙道虛無而開化位乎九霄之上統理諸天總乎十極之中宰制萬化宣金符而垂光濟苦施惠澤而覆育兆民恩溥乾元仁敷浩劫大悲大願大聖大慈玉淸真王南極長生大帝統天元聖天尊北五祖誥志心皈命禮大道開先玄元闡化教垂今古諡號東華接漢室之將軍隱終南而仙契過化每超於劫運示現長在於塵寰啓唐朝之英賢悟神仙之祕訣飛劒貨藥警化無方金廷丞相之高標寶印力辭之勇決霞裾上陟南北統宗天復挺於人豪道遍通於四海發金蓮之七朵演仙派於十方長生理被於古今玄妙天垂於率土恢弘至道廣度愚迷慈悲濟苦全真祖師東華紫府輔元立極大道帝君正陽開悟傳道垂教帝君純陽演正警化孚佑帝君海蟾明悟弘道純佑帝君重陽全真開化輔極帝君五祖闡道天尊南五祖誥志心皈命禮明真正道行化南天九皇降迹於天臺一脈濬通於劉祖採瓊花之仙異著悟真之丹書道付杏林不日還元之編集法通雞足俞琰丹髓之書成真人挺出惠州信地悟超神俊刀圭入口神化無方施雷雨於掌中蘇生民於世外德彰南海獲瓊玉之英標道遍遐荒飫法言之靈妙龍虎羅浮之迹武夷玉隆之書過化多方真文備著為神仙之首冠集前代之範模誓願弘深慈悲仁聖祖師悟真紫陽真人杏林翠玄真人道光紫賢真人泥丸翠虛真人瓊琯紫淸真人五祖蕆道天尊七真誥志心皈命禮道先一氣世顯七真悟五行不到之言得九轉還丹之訣甘泉潤物變朽回春金骨仙姿得四言而契道衛州變化坐十載以成真壁間墨迹之非凡雪竹月松之姿異三井有多生之記一時著顯化之功磻溪六年龍門七載道功備而名聞時主丹符錫而掌握神仙石上談玄空中飛蓋元主屢宣而問道甘霖尅日以濟民早窮易道之言晚造神仙之訣卦圖斯演至道大成淸靜散人探玄得道蓬萊仙路億劫獨持慈悲濟苦全真祖師丹陽抱一無為普化真君長真凝神玄靜藴德真君長生輔化宗玄明德真君長春全德神化明應主教真君玉陽體玄廣慈普度真君太古廣寧通玄妙極真君淸靜淵真玄虛順化元君七真演化天尊普化誥志心皈命禮九天應元府無上玉淸王化行而滿十方談道而趺九鳳三十六天之上閲寶笈考瓊書千五百劫之先位正真權大化手舉金光如意宣説玉樞寶經不順化作微塵發號疾如風火以淸靜心而弘大願以智慧力而伏諸魔總司五雷運心三界羣生父萬靈師大聖大慈至皇至道九天應元雷聲普化天尊人心多散亂一念皆純真欲求無上道大衆轉天尊大衆轉念雷聲普化天尊轉畢回壇大衆跪誦向來誦經念念存誠千真拱聽萬聖通靈應元合氣普化分形九天有命三界遵行消災懺罪請福延生功圓行滿大道證盟丘祖懺文經功浩力不思議回向十方諸聖衆願見真心求懺悔河沙罪障悉消除懺悔我等自從曩劫乃至今生假火風地水以成形戀香味色聲而觸法貪嗔嫉妬惡口妄言殺盜邪淫恣情縱欲逆辱父母悖負君師不敬天地神祗呵風罵雨不信罪福因果昧理欺心遂致報對升沈輪回展轉受諸苦惱無有休停皆由一念之差障迷自性妄認六塵之幻沈溺愛河今而既獲人身叨親正教豈非千生慶幸一旦遭逢自合省心早求度世若夫似前流蕩必竟迷失本來一墮冥途化為異類是故思沈淪苦發淸淨心皈奉聖真特求懺悔丐憐愚昧原赦罪愆解釋報𡨚蠲消魔障所覬命逢昌運名注丹臺際遇真師親聞至道精修妙行增長善芽盡節玄門怡神真境他日運應滅度自性不致昏迷徑生十善之家能通宿命還證上乘之道承侍虛皇尚願國安民豐時和嵗稔願真風丕闡道化興行願凶惡化賢邪魔歸正願兵刑罔措囹圄空間願沈滯升遷𡨚讎和釋願參玄學者入道成真願厯劫種親俱皆超度願歷世師友同證真常願所有眷緣增崇福慧願所傷物命早生人天願絶食酒葷不相殺害願持身端正不履邪淫願悉破慳貪悉除險峻願言無誑妄行貴真誠願弱已饒人潛忍忿怒願慈心下氣恭敬一切願不墮邊夷不隨邪見願結交仙友棲集淸虛願智慧開明神通恢廓願廣行方便普濟羣生願永斷執迷咸歸至道塵劫有盡我願無窮重三遍端望帝真曲垂濟度皈命禮謝無上虛皇至真三寶一者一人有慶二者二景齊明三者三農樂業四者四序和平五者五祠鞏固六者六合澄淸七者七星臨照八者八節安寧九者九泉開泰十者十類生成十一者福留善信十二者大道興行一切神光普照一切衆聖留恩一切有情賴善一切正果成真普天均樂四海同春聞經悟道叨列南宮重三遍誦經功德不可思議諸天諸地轉靈機皇王夀天齊大道慈悲萬化樂雍熙向來禮念諸功德全賴慈悲為主盟仰瞻仙仗隱空玄法部真靈常擁護每遇朔望入祝夀文常日只用靈官神呪仰啓神威豁落將都天糾罰大靈官火車三五大雷公受命三淸降鬼祟手執金鞭巡世界身披金甲顯威靈緑靴風帶護身形雙目火睛耀天地頃刻三天朝上帝須臾九地救生民銀牙鳳嘴將三千虎首𧴀貅兵百萬走火行風前後衛穿山破石捉邪精祈晴禱雨濟世間附體圓光通事意治病驅邪如電閃收瘟攝毒伏羣魔飛騰雲霧遍虛空號令雷霆轟霹𩆝三界大魔皆拱手十方外道悉皈依我今啓請望來臨大賜雷威加擁護太乙雷聲應化天尊經壇土地神之最靈升天達地出幽入冥為吾關奏不得留停有功之日名書上淸向來誦經功德上奉高真下保平安賜福消災同賴善功證無上道一切信禮志心稱念常淸常靜天尊不可思議功德太上早壇功課經終經畢大衆禮三皈依四恩三宥同歸大藏靈文八難九幽俱入元始淨海願以此功德莊嚴無極界上報四重恩下濟三途苦師資與父母法界同宗親現存增福夀過去早超升現前淸淨衆各用皈命禮遇朔望禮四恩三宥常日止念志心皈命禮禮小三歸依志心皈命禮太上道經師寶十方諸天九十九億九萬九千十方國土厯劫度人淸淨真一不二法門本師教主十方常住圖天尊遇朔望祝夀文伏以高高碧落緣寶炷以升聞渺渺大羅俯丹衷而上叩恭炷真香虔誠供養虛無自然大羅三淸三境三寶天尊白玉京中四御四皇上帝高上神霄九宸上帝十方太上靈寶天尊諸天上帝諸后元君南辰北斗河漢羣真三官五老四聖真君扶桑大帝五嶽之神玄門啓教南宗北派五祖七真名山洞府古今得道仙靈冥府十王真君三界伏魔大帝雲空過往糾察真宰琳庭兵馬助道神員太歲城隍土地等神法筵有感一切威靈悉仗真香普同供養以今奏據大淸國某省某府某州某縣某廟焚修弟子某恭遇某年某月某日之辰謹率淸流登臨寶殿諷誦仙經稱揚聖號延奉高真恭祈景貺上祝當今皇帝陛下山呼萬歲再山呼萬歲重稱山呼萬萬歲三呼萬歲齊瞻北極之尊一炷明香永祝南山之夀伏願龍樓鞏固鳳閣常淸八方稱有道之君四海樂無虞之化俾兵革之永息庶封疆而鎮靜千祥溥照萬民樂業更祈本廟香火綿遠教法興隆修真有遇進道無魔伏念弟子某等爰從前世逮及今生或三業以縈纒或六根之沈滯是非海闊人我山高性虧恬淡之純心昧沖和之粹五臘三元莫識懺禳之禮四始十直罔明悔過之儀匪賴恩光之下映曷令魔障之永淸與道有緣度人無量滔滔源流於仙派綿綿不墜於真風再願臣等師資同學父母宗親普天黎庶檀越信民心地虛明性天昭朗劫運可逃而厄難可免安處塵寰而動與吉會再冀刀兵八難無辜殺戮飢饉餓殍凍餒死亡離鄉別士殞於道路既往超虛無之境見存享安樂之鄉仰憑道力為上良因志心稱念玄都萬夀天尊不可思議功德太上玄門早壇功課經終
