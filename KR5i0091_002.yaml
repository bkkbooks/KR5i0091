front:
  text: 太上玄門功課經重刋道藏輯要太上玄門晚壇功課經太上玄門功課經大眾登壇分班序立主經舉大道洞玄虛有念無不契鍊質入仙眞遂成金剛體超度三界難地獄五苦解悉皈太上經靜念稽首禮主經舉太乙救苦天尊靈音到處滅罪消愆寶號宣時扶危救難將當有諷經演教之偈仰勞道眾隨聲應和
  hash: sha256:03f58d94801713210ed39e7b6f409de7c98ec5f61b1e6f6be579336e00f6835f
