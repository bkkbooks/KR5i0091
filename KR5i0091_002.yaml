body:
  text: 救苦天尊妙難求身披霞衣屢劫修五色祥雲生足下九頭獅子道前遊盂中雸露時常灑手内楊柳不記秋千處請師千處降愛河常作度人舟誦經功德不可議孤魂滯魄早超昇香供養十方救苦天尊種種無名是苦根苦根除盡善根存但憑慧劍威神力跳出輪迴五苦門道以無心度有情一切方便是修眞若皈聖智圓通地便是生天得道人道場眾等人各恭敬恭對道前諷經如法寶經未開先持玄藴伏魔神呪大眾謹當持誦開經偈寂寂至無宗虛峙劫仞阿豁落洞玄文誰測此幽遐一入大乘路孰計年劫多不生亦不滅欲生因蓮花超凌三界途慈心解世羅眞人無上德世世爲仙家太上洞玄靈寶救苦妙經爾時救苦天尊徧滿十方界常以威神力救拔諸眾生得離於迷塗眾生不知覺如盲見日月我本太無中拔領無邊際慶雲開生門祥烟塞死戸初發玄元始以通祥感機救一切罪度一切厄𣺌𣺌超仙源蕩蕩自然淸皆承大道力以伏諸魔精空中何灼灼名曰泥丸仙紫雲覆黃老是名三寶君還將上天炁以制九天魂救苦諸妙神善見救苦時天上混無分天炁歸一身皆成自然人自然有別體本在空洞中空洞跡非跡徧體皆虛空第一委炁立第二順炁生第三成萬法第四生光明天上三十六地下三十六太玄無邊際妙哉大洞經皈命太上尊能消一切罪東方玉寶皇上天尊南方玄眞萬福天尊西方太妙至極天尊北方玄上玉宸天尊東北方度仙上聖天尊東南方好生度命天尊西南方太靈虛皇天尊西北方無量太華天尊上方玉虛明皇天尊下方眞皇洞神天尊道言十方諸天尊其數如沙塵化行十方界普濟度天人委炁聚功德同聲救罪人罪人實可哀我今說妙經念誦無休息歸身不暫停天堂享大福地獄無苦聲火翳成淸署劎樹化爲騫上登朱陵府下入開光門超度三界難逕上元始天於是飛天神王無鞅敷眾瞻仰尊顏而作頌曰天尊說經教接引於浮生勤修學無爲悟眞道自成不迷亦不荒無我亦無名朗詠罪福句萬徧心垢淸爾時飛天神王及諸仙眾說是頌畢稽首天尊奉辭而退太上洞玄靈寶救苦妙經元始天尊說生天得道眞經爾時元始天尊在大羅天上玉京山中爲諸天仙眾說此生天得道眞經告諸仙曰吾今爲汝略啟身心明宣道要十方要道神仙皆從此經修行而通微奧善男子善女人依憑齋戒作是津梁一切有爲顯諸眞路體此法相乃可受持能屏眾縁永除染著外想不入内想不出於正念中乃得五臟淸涼六腑調泰三百六十骨節之間有諸滯礙十惡之業百八十煩惱之業眾苦罪源悉皆除蕩卽引太和眞炁注潤身田五臟六腑心目内觀眞炁所有淸淨光明虛白朗曜杳杳冥冥内外無事昏昏默默正達無爲古今常存總持靜念從慈解悟道力資扶法藥相助仍節飲食驅遣鬼尸安寂六根靜照八識空其五藴證妙三元得道成眞自然昇度爾時諸天仙眾上白天尊言自從無始以來至於今日未聞如是大乘經典我等縁茲幸會廣及一切道果圓明而說偈曰杳杳冥冥淸靜道昏昏默默太虛蹤體性湛然無所住色心都寂一眞宗元始天尊說生天得道眞經太上道君說解𡨚拔罪妙經爾時太上道君與諸聖眾在八騫林下七寶臺中羅列威儀敷陳道要怡神默坐如玉京山放七寶光明照福堂地獄見福堂之内男女善人快樂無爲逍遙自在復見諸地獄之中餓鬼窮魂以日繼夜受種種苦惱悉無人形五體壞爛饑飡猛火渴飲鎔銅足履刀山身負鐵杖遍體流血悲號徹天是時會中有一眞人名曰廣信從座而起稽首前進上白道君曰不審此輩窮魂生有何咎而受茲苦道君曰受諸罪者在世之時不敬三光欺負神理十惡五逆不忠不仁不慈不孝毀傷物命殺害眾生福盡夀終當受斯苦是時廣信眞人心生哀憫欲其濟拔幸望妙力威光許令開度伏蒙道君垂賜金言廣設法要爲諸眾生演說是經名曰解𡨚拔罪流布於世利益存亡若有善男子善女人一心專志入靜持齋焚香行道六時轉念是經吾當隨願保佑其人使宿世𡨚讎乘福超度幽魂苦爽各獲超昇眞人廣信歡喜再拜覼縷勝因而作頌曰偉哉大道君常普無量功舟楫生死海濟度超羅酆罪對不復遇福報與冥通用神安可測讚之焉能窮是時廣信眞人與諸聖眾聞法將畢各各稽首皈依信受奉行太上道君說解𡨚拔罪妙經斗母誥志心皈命禮西天竺國大智光中眞空妙用法王師無上玄元天母主金光爍處日月潛輝寶杵旋時鬼神失色顯靈蹤於塵世衞聖駕於閻浮眾生有難若稱名大士尋聲來救苦大悲大願大聖大慈聖德巨光天后摩利攴天大聖先天斗母元君三官誥志心皈命禮唯三聖人乃一太極昔受浩劫家之命鼎膺無量品之褒紫微淸虛洞陰總領功過賜福赦罪解厄溥濟存亡道冠諸天恩覃三界大悲大願大聖大慈三元三品三官大帝三宮九府應感天尊玄天誥志心皈命禮混元六天傳法教主修眞悟道濟度羣迷普爲眾生消除災障八十二化三教祖師大慈大悲救苦救難三元都總管九天遊弈使左天罡北極右垣大將軍鎭天助順眞武靈應福德衍慶仁慈正烈協運眞君治世福神玉虛師相玄天上帝金闕化身蕩魔天尊天師誥志心皈命禮本來南土上泝蜀都先獲黃帝九鼎之丹書後事老君兩度於玉局千軸得修行之要一時成吐納之功法籙全成受盟威品而結璘訣正邪兩辨奮福庭冶而化鹹泉德就大丹道齊七政大悲大願大聖大慈三天扶教輔元體道大法天師雷霆都省泰玄上相都天大法主正一冲玄神化靜應顯佑眞君六合無窮高明大帝降魔護道天尊呂祖誥志心皈命禮玉淸内相金闕選仙化身爲三教之師掌法判五雷之令黃梁夢覺忘世上之功名寶劍光騰掃人間之妖怪四生六道有感必孚三界十方無求不應黃鵠溪頭留聖跡玉淸殿内鍊丹砂存道像於山崖顯仙跡於雲洞闡法門之香火作玄嗣之梯航大聖大慈大仁大孝開山啟教靈應祖師天雷上相靈寶眞人燮元贊運純陽演正警化孚佑帝君興行妙道天尊薩眞君誥志心皈命禮派流西地跡顯龍興施財合藥濟羣生積行累功修至道授鐵師之教旨掌玉府之雷書身披百衲伏魔衣手執五明降鬼扇代之宣化呪棗書符運風雷於咫尺之間翦妖魔於斗罡之下道參太極位列先天松筠野鶴任縱橫遐邇孤雲常自在方方闡教爲萬法之宗師處處開壇作後人之模範都天宗主一元無上薩翁眞君王靈官誥志心皈命禮先天主將一炁神君都天糾罰大靈官三界無私猛吏將金睛朱髮號三五火車雷公鳳嘴銀牙統百萬𧴀貅神將飛騰雲霧號令雷霆降雨開晴驅邪治病觀過錯於一十二年授命玉帝積功動於百千萬種誓佐祖師至剛至勇濟死濟生方方闡教處處開壇豁落猛吏三五火車大乙雷神應化天尊救苦誥志心皈命禮靑華長樂界東極妙嚴宮七寶芳騫林九色蓮花座萬眞環拱内百億瑞光中玉淸天寶尊應化玄元始浩劫垂慈濟大千甘露門妙道眞身紫金瑞相隨機赴感誓願無邊大聖大慈大悲大願十方化號普度眾生億億劫中度人無量尋聲赴感太乙救苦天尊靑玄上帝主壇舉愛河千層浪苦海萬丈深欲免輪迴苦大眾轉天尊大眾出壇轉念太乙救苦天尊轉至孤魂處施食畢回壇跪念靑華妙嚴慈相億千身居長樂尊座金蓮慧光無礙照諸幽泉甘露流潤徧灑空玄朽骸枯骨咸得光鮮拔度沈溺不滯寒淵上請天官解天厄地官解地厄水官解水厄五帝解五方厄四聖解四時厄南辰解本命厄北斗解一切厄於是七元君大聖善通靈濟度諸厄難超出苦眾生若有急吿者持誦保安平盡憑生百福咸契於五行三魂得安健邪魅不能停五方降眞炁萬福自來駢長生超八難皆由奉七星生生身自在世世保神淸善似光中影應如谷裏聲三元神共護萬聖眼同明無災亦無障永保道心甯報恩誥志心皈命禮玄元應化五曲分眞垂念我等眾生有相脫生父母懷躭十月乳哺三年辛苦百千殷勤寸念憐我父母日漸衰朽我今持念平等悉滅嶮峻貪嗔禮帝爲師祈恩報本願我現在父母福夀增延過去宗祖早得超昇大聖大慈大仁大孝八十二化報恩教主佑聖眞武治世福神玉虛師相玄天上帝金闕化身終劫濟苦天尊一願風調雨順二願五穀豐登三願皇王萬𡻕四願國土淸平五願民安物阜六願福夀康甯七願災消禍散八願水火無侵九願聰明智慧十願學道成眞十一願諸神擁護十二願亡者超昇一切飛禽走獸一切螻蟻蛇蟲一切𡨚家債主一切男女孤魂四生六道一切寒林聞經聽法早得超昇重三遍靑華救主太乙慈尊玉淸應化顯金身大千甘露門接引羣生永出愛河津接引羣生永出愛河津願滅三障諸煩惱願得智慧心明了普願災障悉消除世世常行無上道四恩三有均利益十洲三島任逍遙回向四府眾龍神禮謝道經師三寶向來誦經福無邊風調雨順民安樂願以此功德普及於一切誦經保平安消災增福夀此間土地神之最靈昇天達地出幽入冥爲吾關奏不得留停有功之日名書上淸向來誦經功德上奉高眞下保平安賜福消災同賴善功證無上道一切信禮志心稱念太乙救苦天尊不可思議功德主經白旣誦經語當解經義各自省心早求度世人身不易得正法最難遇但念無常苦各發淸靜志掃除諸妄念去卻貪嗔癡懺悔往昔非當求今日是猛勇生精進各用皈命禮志心皈命禮靑華聖境東極上宮十方化號良羣生百億光中瞻妙相九色蓮花作慈航之彼岸一枝楊柳開甘露之法門九千九萬億同名同號聖幢旛寶蓋後引道師大慈大悲尋聲赴感太乙救苦天尊十方靈寶天尊隨願往生天尊以上各天尊一拜畢再三拜分班圓揖禮畢晚壇功課經終隨堂施食一宗大眾念天尊至寒林所分班序立畢主經舉符命與通傳惠光照九泉三魂朝上帝七魄聽靈篇三途離長夜五苦盡釋愆業海皆息浪聞法到人天太乙救苦天尊東極靑華妙嚴宫紫霧霞光徹太空千朵蓮花映寶座九頭獅子出雲中南極丹臺開寶笈北斗玄禁破羅酆惟願垂光來救苦臣等稽首禮慈容施食功德不思議孤魂滯魄早超昇香供𠐒十方救苦天尊玉訣應化雸露食普施河沙眾鬼魂願皆飽滿捨慳貪脫化人天生淨外汝等鬼神眾吾今施汝供一粒徧十方河沙鬼神用常樂天宫不夜春普施雸露濟羣生頓息塵埃歸正道法眾調誦五㕑經一炁和太和得一道皆泰和乃無一和玄理通玄際不以意思意亦不求無思意而無有意是法如是持莫將心縁心還莫住絕縁心在莫存心眞則守眞淵修理志離志積修不符離志而不修志已業無已知諸食炁結炁非諸久定結炁歸諸本炁隨取當隨洩奉請變食神王變食小吏變此法食遍滿天地自然天㕑食普及於一切神魂饑渴者盡沾雸露味奉請東王公西王母太乙天尊降雸露三天無量食充滿法界中濟汝饑渴者淸靜無量身饑虛生飽滿熱惱得淸涼一切饑渴者同登極樂界救苦誥靑華長樂界東極妙嚴宮七寶芳騫林九色蓮花座萬眞環拱内百億瑞光中玉淸天寶尊應化玄元始浩劫垂慈濟大千甘露門妙道眞身紫金瑞相隨機赴感誓願無邊大聖大慈大悲大願十方化號普度眾生億億劫中度人無量尋聲赴感太乙救苦天尊靑玄上帝茫茫酆都中重重金剛山靈寶無量光洞照炎池煩七祖諸幽魂身隨香雲旛定慧生蓮花上生神永安往生咒寒庭多悲苦回心禮元皇女靑靈寶符中山靑帝書一念昇太淸默念觀太無功德九幽下旋旋生紫虛童子於寒林前施食畢念翻翻五帝駕飄飄玄上門遊步黃華野迴靈驕樂端採集飛空景舊爽多不從太微回黃旗無英命靈旛攝召長夜府開度受生魂向來誦詠眞經加持呪食皆諸天寶篆玉淸祕章恩周三界聲聞十方變此食爲天㕑之味化此水爲甘露之漿食之者解萬劫之愆飲之者洗多生之垢尙慮汝等性本顓木情欲執着違眞背道迷失性天是以元始法王慈悲教主說此生天得道眞經頓明心地迁達性根汝等臨壇之魂爽更宜回心而向道積善者加志前進作惡者速改夙愆誓訣歸于一乘必再生於萬善以眞覺而覺妄推自利而利他然後澤及四恩善資萬彙盡法界有情之類沾聖賢無量之恩仗此法食各生仙界具有錢財寶籙恭行化煉宣讀或用寶籙或燒錢𦀦畢又念元始符命時刻升遷北都寒池部衞形魂制魔保舉度品南宮死魂受鍊仙化成人生生受度劫劫長存隨劫輪轉與天齊年永度三途五苦八難超凌仙界逍遙上淸三陽濟煉最上妙縁承斯聖力普濟羣生伏願風雷銅柱變淸涼之淨境溟泠鑊湯化七寶之瑤池羅酆山下作蓬萊之閬苑鐵圍無間成洞府之仙鄕三途息苦八難超昇先亡祖禰師友宗親速居快樂之鄕早登人天之路修眞霞友聞法善人悟本性之眞元了玄關之要妙四恩普報三有齊資一切有情同登道岸志心稱念太乙救苦天尊酆都拔罪天尊十方無盡量天尊不可思議功德救苦天尊誓願深甘露灑開地獄門若要孤魂昇仙界大眾回壇念天尊生天得道天尊眾念天尊回壇隨堂施食科終供養科功舉香㕑妙供天尊臣聞酌水獻香花惟一誠而可叩然燈供齋寶奉十獻以爲䖍仰瞻大道以遐觀俯察精修而致禱鑒茲葵藿納此蘋蘩敬殫寅畏之心恪進丹衷之意以今臨午早進獻香饈所迎鶴馭伏願七寶高眞撫几乘龍鸞而下邁九宸上聖登輦控鶴馭以來臨上天星斗羣眞普臨法會三官四聖師眾齊降玄壇法籙諸司天神帥將雲車風馬以浮空監壇護道五嶽聖帝水府眞靈馭氣乘風而地湧翊衞瑤壇后土眞靈邕邕而來十宫聖眾濟濟迓臨城隍廟貌之諸神英風蒞至太𡻕眞官之主宰恪謹司存符使功曹祇應等神立壇設像應感眞靈風馬音傳而絡繹峩冠博帶以來臨俯鑒齋筵受歆供養法眾運誠玉音讚詠香淸淨道德香上獻虛皇遙瞻法駕降祥光願祝當今明聖主萬夀無疆花仙苑百花生捧獻高明嬌紅嫩綠展凡情四季開時來進上百福崇增燈銀燈影皎光上映穹蒼輝煌照耀吐銀缸齋主䖍誠來點獻集福迎祥水酌水獻高眞洗滌塵氛百川萬海自流津沐浴華池能盥潄福祿齊臻菓異菓色顏奇上奉神祇裝嚴設供過萍實亘古排筵陳祭事錫福延禧茶蕾蕊發新茶白雪黃芽盧同自古泛靈葩趙州果老能知味出自仙家齋雲㕑辦香齋妙用奇哉珍饈百味獻瓊臺然此粢盛涓潔供禍自天來寶萬寶妙莊嚴上奉諸天滋民富庶廣無邊法海靈山光普現釋罪消愆帕蜀錦共吳綾邦獻洪名團花夀字繡回紋豐稔蠶收時和順五福駢臻錢錢寶奉眞靈誠格天庭謀求遂意永前程作善降祥無悋惜福夀綿洪獻供已畢列聖歡歆法眾運誠眞經供養誦經靈文已徹請入琅函獻供疏文對聖敷宣宣疏向伸疏文宣白云周於就爐前恭行化煉送化向來上供功德筵奉高眞賜福消災同賴善功證無上道志心稱念香㕑妙供天尊不可思議功德供養呪一切因縁進供爲先存者快樂已往昇天當來淨土衣食自然上獻三天教主河漢羣眞獻神奉師法界人天普同供養志心稱念香㕑妙供天尊不可思議功德又供養呪供養三天教主淸淨法身滿空聖眾無量羣眞黍米一粒雲㕑寶鼎烹爲法饌異香滿空廣備十方照臨大眾法界人天普同供養志志稱念香㕑妙供天尊不可思議功德戛齋呪天靈節榮願保長生太玄之一守其眞形五臟神君各保安甯志心稱念長生保命天尊不可思議功德又戛齋咒齋供已畢各發誠心勇猛精進證聖成眞志心稱念福生無量天尊不可思議功德大上玄門晚壇功課經終
