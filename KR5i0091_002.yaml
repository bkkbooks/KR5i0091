front:
  text: 太上玄門功課經重刋道藏輯要太上玄門晚壇功課經太上玄門功課經大衆登壇分班序立主經舉大道洞玄虛有念無不契鍊質入仙真遂成金剛體超度三界難地獄五苦解悉皈太上經靜念稽首禮主經舉太乙救苦天尊靈音到處滅罪消愆寶號宣時扶危救難將當有諷經演教之偈仰勞道衆隨聲應和
  hash: sha256:cab28b2df82c79835eb2c4c15039188ebb3897ffcb0d8e55441feee1eca9d2f1
